name: Actualizar datos BigQuery

on:
  schedule:
    - cron: '0 13 * * *'  # 7:00 AM Colombia/México (UTC-5/UTC-6)
  workflow_dispatch:       # Permite ejecutar manualmente

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/setup-gcloud@v2

      - name: Authenticate with user credentials
        run: |
          echo '${{ secrets.GCP_CREDENTIALS }}' > /tmp/adc.json
          gcloud config set project ${{ secrets.GCP_PROJECT }}
          echo "CLOUDSDK_AUTH_CREDENTIAL_FILE_OVERRIDE=/tmp/adc.json" >> $GITHUB_ENV
          echo "GOOGLE_APPLICATION_CREDENTIALS=/tmp/adc.json" >> $GITHUB_ENV

      # =========================================================
      # Tablero: Performance Campañas Colombia
      # =========================================================
      - name: Query — performance-campanas-co
        if: always()
        run: |
          bq query --use_legacy_sql=false --format=json --max_rows=500000 \
            < performance-campanas-co/query.sql > /tmp/perf_campanas_raw.json

      - name: Process — performance-campanas-co
        if: always()
        run: |
          python3 -c "
          import json, datetime
          with open('/tmp/perf_campanas_raw.json') as f:
              raw = json.load(f)
          def i(v): return int(v) if v is not None else 0
          def fl(v): return float(v) if v is not None else 0.0
          rows = [{
              't':  r['tipo'],
              'd':  r['dia'],
              's':  int(r['fuente_id']) if r.get('fuente_id') is not None else None,
              'p':  r.get('plataforma') or 'Otros',
              'c':  r.get('campana') or '',
              'cr': i(r.get('creados')),
              'cl': i(r.get('calificados')),
              'as': i(r.get('asignados')),
              'ct': i(r.get('citas')),
              'ci': i(r.get('cierres')),
              'sp': fl(r.get('spend')),
              'cl_l': i(r.get('clicks_link')),
              'cl_t': i(r.get('clicks_totales')),
              'im': i(r.get('impressions')),
          } for r in raw]
          payload = {
              'generated': datetime.datetime.utcnow().strftime('%Y-%m-%d %H:%M UTC'),
              'rows': rows
          }
          with open('performance-campanas-co/data.json','w') as f:
              json.dump(payload, f, separators=(',',':'))
          print(f'performance-campanas-co rows: {len(rows)}')
          "

      # =========================================================
      # ↓↓↓ Agregar más tableros aquí siguiendo el mismo patrón ↓↓↓
      # 1. Crear carpeta nueva con query.sql + index.html + data.json
      # 2. Agregar dos steps acá: "Query — <nombre>" y "Process — <nombre>"
      # 3. Agregar la carpeta al "git add" del step de commit
      # 4. Agregar un card al index.html raíz
      # =========================================================

      - name: Commit and push
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add performance-campanas-co/data.json
          if git diff --staged --quiet; then
            echo "Sin cambios"
          else
            git commit -m "Auto-update data.json $(date -u +%Y-%m-%d)"
            git push
          fi
